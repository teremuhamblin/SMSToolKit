<svg width="260" height="260" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">

  <!-- Dégradé holographique -->
  <defs>
    <radialGradient id="holo" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0A0F1C"/>
      <stop offset="60%" stop-color="#0A1A2A"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Glow néon animé -->
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grille tech -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00E0FF22" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Cercle principal -->
  <circle cx="130" cy="130" r="115" fill="url(#holo)" stroke="#00E0FF" stroke-width="3" filter="url(#neon)">
    <!-- Animation pulse -->
    <animate attributeName="stroke-width" values="3;5;3" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Grille interne animée -->
  <circle cx="130" cy="130" r="105" fill="url(#grid)" opacity="0.25">
    <animateTransform attributeName="transform" type="rotate"
      from="0 130 130" to="360 130 130" dur="20s" repeatCount="indefinite"/>
  </circle>

  <!-- Icône SMS -->
  <g transform="translate(50,55)">
    <!-- Ombre -->
    <rect x="0" y="0" width="160" height="95" rx="14" fill="#00000055"/>

    <!-- Cadre -->
    <rect x="0" y="0" width="160" height="95" rx="14"
          fill="none" stroke="#00E0FF" stroke-width="4" filter="url(#neon)">
      <!-- Pulse léger -->
      <animate attributeName="stroke-opacity" values="1;0.6;1" dur="2.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Lignes du message -->
    <line x1="20" y1="35" x2="140" y2="35" stroke="#00E0FF" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="60" x2="120" y2="60" stroke="#00E0FF" stroke-width="4" stroke-linecap="round"/>

    <!-- Pointe -->
    <polygon points="120,95 140,120 140,95"
             fill="#0A0F1C" stroke="#00E0FF" stroke-width="4" filter="url(#neon)">
      <!-- Animation vibrante -->
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 0 1; 0 0" dur="1.8s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Anneau holographique animé -->
  <circle cx="130" cy="130" r="125"
          stroke="#00E0FF55" stroke-width="2" fill="none" stroke-dasharray="6 12">
    <animateTransform attributeName="transform" type="rotate"
      from="0 130 130" to="-360 130 130" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- Scanline holographique -->
  <rect x="0" y="0" width="260" height="260" fill="none" stroke="#00E0FF11" stroke-width="1">
    <animate attributeName="y" values="-260;260" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Texte -->
  <text x="130" y="225" font-family="Arial, sans-serif" font-size="26"
        fill="#00E0FF" text-anchor="middle" letter-spacing="3" filter="url(#neon)">
    SMSToolKit
    <animate attributeName="opacity" values="1;0.7;1" dur="3s" repeatCount="indefinite"/>
  </text>

</svg>
