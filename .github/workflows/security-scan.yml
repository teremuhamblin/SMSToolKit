name: Security Scan

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Audit npm
        run: npm audit --audit-level=moderate || true

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@v3

      - name: Validate JSON
        run: |
          find . -name "*.json" -print0 | xargs -0 -I {} jq empty {}
